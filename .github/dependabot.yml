version: 2

updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "22:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 15
    assignees:
      - "3rr0r-505"
    labels:
      - "dependabot"
    commit-message:
      prefix: "ci"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

